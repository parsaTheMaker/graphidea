<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainstorming Graph</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- SVG Icons directly injected so we don't need external libraries, or just minimal use -->
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="overlay">
        <div class="login-card">
            <h2>Team Access</h2>
            <p>Please enter the passphrase to view the board.</p>
            <div class="input-container">
                <input type="password" id="teamPassword" placeholder="Passphrase" required>
            </div>
            <button id="loginBtn" class="btn primary-btn">Enter Workspace</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="hidden app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Brainstorming</h2>
                <p>Submit a new concept</p>
            </div>
            
            <form id="ideaForm" class="idea-form">
                <div class="form-group">
                    <label for="authorName">Your Name</label>
                    <input type="text" id="authorName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="ideaTitle">Idea Title</label>
                    <input type="text" id="ideaTitle" placeholder="e.g. Gravity powered car" required>
                </div>
                <div class="form-group">
                    <label for="ideaDesc">Description</label>
                    <textarea id="ideaDesc" rows="5" placeholder="Explain how it works..." required></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn primary-btn btn-block">Add to Graph</button>
            </form>
            <div id="statusMsg" class="status-msg"></div>
        </aside>

        <main class="main-content">
            <div id="mynetwork"></div> 
        </main>
    </div>

    <!-- Detail / Edit Modal -->
    <div id="ideaModal" class="modal hidden">
        <div class="modal-card">
            <button class="close-btn" aria-label="Close" id="closeModalBtn">&times;</button>
            
            <!-- View Mode -->
            <div id="modalViewMode">
                <h3 id="modalTitle">Title</h3>
                <span class="badge" id="modalAuthor">Name</span>
                
                <div class="modal-body">
                    <p id="modalDesc">Description goes here...</p>
                </div>

                <div class="modal-actions modal-footer">
                    <button id="modalEditBtn" class="btn secondary-btn">Edit Idea</button>
                    <button id="modalDeleteBtn" class="btn danger-btn">Delete Node</button>
                </div>
            </div>

            <!-- Edit Mode -->
            <div id="modalEditMode" class="hidden">
                <h3>Edit Idea</h3>
                <input type="hidden" id="editIdeaId">
                <div class="form-group">
                    <label for="editAuthorName">Name</label>
                    <input type="text" id="editAuthorName" required>
                </div>
                <div class="form-group">
                    <label for="editIdeaTitle">Title</label>
                    <input type="text" id="editIdeaTitle" required>
                </div>
                <div class="form-group">
                    <label for="editIdeaDesc">Description</label>
                    <textarea id="editIdeaDesc" rows="5" required></textarea>
                </div>
                
                <div id="editStatusMsg" class="status-msg"></div>

                <div class="modal-actions modal-footer">
                    <button id="saveEditBtn" class="btn primary-btn">Save Changes</button>
                    <button id="cancelEditBtn" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right-click Context Menu has been removed as per cleaner UI requirements -->

    <script type="module" src="app.js"></script>
</body>
</html>
