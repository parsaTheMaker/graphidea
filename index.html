<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainstorming Network</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="overlay">
        <div class="login-box glass-panel">
            <div class="login-header">
                <span class="material-symbols-outlined login-icon">hub</span>
                <h2>Neural Network</h2>
            </div>
            <p class="subtitle">Enter the team password to synchronize.</p>
            <div class="input-group">
                <input type="password" id="teamPassword" required>
                <label for="teamPassword">Password</label>
            </div>
            <button id="loginBtn" class="primary-btn">Unlock App</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="hidden app-layout">
        <div class="sidebar glass-panel">
            <div class="sidebar-header">
                <span class="material-symbols-outlined login-icon">lightbulb</span>
                <h2>Submit an Idea</h2>
            </div>
            <form id="ideaForm" class="styled-form">
                <div class="input-group">
                    <input type="text" id="authorName" required>
                    <label for="authorName">Your Name</label>
                </div>
                <div class="input-group">
                    <input type="text" id="ideaTitle" required>
                    <label for="ideaTitle">Idea Title</label>
                </div>
                <div class="input-group">
                    <textarea id="ideaDesc" rows="4" required></textarea>
                    <label for="ideaDesc">Describe your idea in detail...</label>
                </div>
                <button type="submit" id="submitBtn" class="primary-btn">
                    <span class="material-symbols-outlined">add_circle</span>
                    Submit & Map Idea
                </button>
            </form>
            <p id="statusMsg" class="status-msg"></p>
        </div>

        <div class="main-content">
            <div class="header-overlay glass-panel short-glass">
                <h1>Idea Ecosystem</h1>
                <p>AI-powered similarity mapping</p>
            </div>
            <div id="mynetwork"></div> 
        </div>
    </div>

    <!-- Right-click Context Menu -->
    <div id="contextMenu" class="context-menu glass-panel hidden">
        <button id="contextEditBtn"><span class="material-symbols-outlined">edit</span> Edit Idea</button>
        <button id="contextDeleteBtn" class="danger-btn"><span class="material-symbols-outlined">delete</span> Remove</button>
    </div>

    <!-- Detail / Edit Modal -->
    <div id="ideaModal" class="modal hidden">
        <div class="modal-content glass-panel">
            <span class="close-btn material-symbols-outlined">close</span>
            
            <!-- View Mode -->
            <div id="modalViewMode">
                <h2 id="modalTitle">Title</h2>
                <p class="meta-data"><span class="material-symbols-outlined">person</span> <strong id="modalAuthor">Name</strong></p>
                <div class="desc-box">
                    <p id="modalDesc">Description goes here...</p>
                </div>
            </div>

            <!-- Edit Mode -->
            <div id="modalEditMode" class="hidden styled-form">
                <h2>Edit Idea</h2>
                <input type="hidden" id="editIdeaId">
                <div class="input-group">
                    <input type="text" id="editAuthorName" required>
                    <label for="editAuthorName">Your Name</label>
                </div>
                <div class="input-group">
                    <input type="text" id="editIdeaTitle" required>
                    <label for="editIdeaTitle">Idea Title</label>
                </div>
                <div class="input-group">
                    <textarea id="editIdeaDesc" rows="4" required></textarea>
                    <label for="editIdeaDesc">Describe your idea in detail...</label>
                </div>
                <div class="action-buttons">
                    <button id="saveEditBtn" class="primary-btn">Save Changes</button>
                    <button id="cancelEditBtn" class="secondary-btn">Cancel</button>
                </div>
                <p id="editStatusMsg" class="status-msg"></p>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
