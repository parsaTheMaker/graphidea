<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brainstorming Graph</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <!-- SVG Icons directly injected so we don't need external libraries, or just minimal use -->
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>

<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="overlay">
        <div class="login-card">
            <h2>Team Access</h2>
            <p>Please enter the passphrase to view the board.</p>
            <div class="input-container">
                <input type="password" id="teamPassword" placeholder="Passphrase" required>
            </div>
            <button id="loginBtn" class="btn primary-btn">Enter Workspace</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <!-- App Container -->
    <div id="appContainer" class="hidden app-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2>Brainstorming</h2>
                    <p>Submit a new concept</p>
                </div>
                <!-- 4. Dark Mode Toggle -->
                <button id="darkModeToggle" class="btn secondary-btn" style="padding: 0.5rem; font-size: 1.2rem;">🌙</button>
            </div>

            <!-- 1. Search and Filter -->
            <div class="search-section form-group">
                <input type="text" id="searchInput" placeholder="Semantic AI Search...">
                <button id="searchBtn" class="btn secondary-btn btn-block" style="margin-top: 5px;">Search</button>
            </div>

            <hr class="sidebar-divider">
            
            <form id="ideaForm" class="idea-form">
                <div class="form-group">
                    <label for="authorName">Your Name</label>
                    <input type="text" id="authorName" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="ideaTitle">Idea Title</label>
                    <input type="text" id="ideaTitle" placeholder="e.g. consultancy for import of cars" required>
                </div>
                <div class="form-group">
                    <label for="ideaDesc">Description</label>
                    <textarea id="ideaDesc" rows="5" placeholder="Explain how it works..." required></textarea>
                </div>
                <!-- 2. Categories / Tags -->
                <div class="form-group">
                    <label for="ideaTags">Category Tags</label>
                    <input type="text" id="ideaTags" placeholder="e.g. marketing, design">
                </div>
                <button type="submit" id="submitBtn" class="btn primary-btn btn-block">Add to Graph</button>
            </form>
            <div id="statusMsg" class="status-msg"></div>

            <hr class="sidebar-divider">

            <!-- 5. Export Button -->
            <button id="exportBtn" class="btn secondary-btn btn-block">Download as PNG</button>
        </aside>

        <main class="main-content">
            <!-- 4. Canvas Controls -->
            <div class="canvas-controls">
                <button id="gatherBtn" class="btn control-btn" title="Gather Nodes" style="font-weight: bold; font-family: monospace;">&gt;&lt;</button>
                <button id="zoomInBtn" class="btn control-btn" title="Zoom In">+</button>
                <button id="zoomOutBtn" class="btn control-btn" title="Zoom Out">-</button>
                <button id="fitViewBtn" class="btn control-btn" title="Fit to Screen">[ ]</button>
            </div>
            
            <div id="mynetwork"></div>
        </main>
    </div>

    <!-- Detail / Edit Modal -->
    <div id="ideaModal" class="modal hidden">
        <div class="modal-card">
            <button class="close-btn" aria-label="Close" id="closeModalBtn">&times;</button>

            <!-- View Mode -->
            <div id="modalViewMode">
                <h3 id="modalTitle">Title</h3>
                <div>
                    <span class="badge" id="modalAuthor">Name</span>
                    <span class="badge" id="modalTagsDisplay" style="background:var(--primary-color);color:#fff;">Tags</span>
                </div>

                <div class="modal-body">
                    <p id="modalDesc">Description goes here...</p>
                </div>
                
                <div class="votes-section">
                    <span id="modalVotesDisplay">0 Votes</span>
                </div>

                <!-- 3. Comments Section -->
                <div class="comments-section" style="margin-top: 1rem;">
                    <h4>Discussion</h4>
                    <div id="commentsList" style="max-height: 100px; overflow-y: auto; background: #f9fafb; padding: 0.5rem; border-radius: 6px; font-size: 0.85rem; border: 1px solid var(--border-color); margin-bottom: 0.5rem;">
                        <!-- Comments injected here -->
                    </div>
                    <div style="display: flex; gap: 5px;">
                        <input type="text" id="newCommentInput" placeholder="Add a comment..." style="flex:1; padding: 0.5rem; font-size:0.85rem; border: 1px solid var(--border-color); border-radius: 4px;">
                        <button id="addCommentBtn" class="btn primary-btn" style="padding: 0.5rem 0.75rem; font-size: 0.85rem;">Post</button>
                    </div>
                </div>

                <div class="modal-actions modal-footer">
                    <!-- Upvote/Downvote -->
                    <button id="modalUpvoteBtn" class="btn primary-btn">👍 Upvote</button>
                    <button id="modalDownvoteBtn" class="btn secondary-btn" style="color:var(--danger-color)">👎</button>
                    <div style="flex:1;"></div>
                    <button id="modalEditBtn" class="btn secondary-btn">Edit Idea</button>
                    <button id="modalDeleteBtn" class="btn danger-btn">Delete Node</button>
                </div>
            </div>

            <!-- Edit Mode -->
            <div id="modalEditMode" class="hidden">
                <h3>Edit Idea</h3>
                <input type="hidden" id="editIdeaId">
                <div class="form-group">
                    <label for="editAuthorName">Name</label>
                    <input type="text" id="editAuthorName" required>
                </div>
                <div class="form-group">
                    <label for="editIdeaTitle">Title</label>
                    <input type="text" id="editIdeaTitle" required>
                </div>
                <div class="form-group">
                    <label for="editIdeaDesc">Description</label>
                    <textarea id="editIdeaDesc" rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editIdeaTags">Category Tags</label>
                    <input type="text" id="editIdeaTags">
                </div>

                <div id="editStatusMsg" class="status-msg"></div>

                <div class="modal-actions modal-footer">
                    <button id="saveEditBtn" class="btn primary-btn">Save Changes</button>
                    <button id="cancelEditBtn" class="btn secondary-btn">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Right-click Context Menu has been removed as per cleaner UI requirements -->

    <script type="module" src="app.js"></script>
</body>

</html>
